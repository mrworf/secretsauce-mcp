server:
  listen: 127.0.0.1:8080
  mcp_path: /mcp

auth:
  mode: bearer
  bearer:
    token_env: TEST_GATEWAY_TOKEN

tokens:
  idle_ttl: 10m
  max_ttl: 1h

limits:
  max_inbound_body: 1mb
  inbound_body_timeout: 10s
  max_request_body: 1mb
  max_response_body: 5mb
  timeout: 30s

services:
  portainer-prod:
    type: http
    name: Portainer Production
    description: Main Portainer instance
    destinations:
      - name: primary
        base_url: https://portainer.internal:9443
        schemes: [https]
        hosts:
          - exact: portainer.internal
          - suffix: .home.arpa
          - regex: '^portainer-[a-z0-9-]+\.internal$'
        ports: [9443]
    tls:
      verify: false
    credentials:
      - id: api_key
        usage:
          kind: header
          name: X-API-Key
        source:
          kind: env
          name: PORTAINER_API_KEY
    access:
      users:
        - henric@example.com
    policy:
      mode: deny
      rules:
        - id: allow-stack-read
          effect: allow
          priority: 100
          methods: [GET]
          paths:
            - /api/stacks.*
