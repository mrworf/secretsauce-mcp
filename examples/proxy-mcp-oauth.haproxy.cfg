global
  log stdout format raw local0
  maxconn 256

defaults
  log global
  mode http
  option httplog
  option http-buffer-request
  timeout connect 5s
  timeout client 65s
  timeout server 65s
  timeout http-request 10s
  timeout http-keep-alive 10s

frontend secretsauce_mcp_oauth
  bind :443 ssl crt /etc/haproxy/certs/mcp.example.org.pem alpn h2,http/1.1
  acl allowed_path path -i /mcp /.well-known/oauth-protected-resource /.well-known/oauth-authorization-server /.well-known/openid-configuration /oauth/authorize /oauth/token
  http-request deny deny_status 404 unless allowed_path
  http-request deny deny_status 413 if { req.body_size gt 2097152 }
  http-request del-header Forwarded
  http-request del-header X-Forwarded-For
  http-request del-header X-Forwarded-Host
  http-request del-header X-Forwarded-Proto
  http-response set-header Strict-Transport-Security "max-age=31536000"
  default_backend secretsauce_mcp

backend secretsauce_mcp
  option httpchk GET /health
  http-check expect status 200
  server gateway 127.0.0.1:8080 check maxconn 128
