services:
  agent-credential-gateway:
    build: .
    image: agent-credential-gateway-mcp:latest
    ports:
      - "8080:8080"
    volumes:
      - ./examples/config.yaml:/config/config.yaml:ro
      # Replace this mount source with a custom extend/replace rules file as needed.
      - ./config/secretlint.yaml:/config/secretlint.yaml:ro
      - ./config/sensitive-names.yaml:/config/sensitive-names.yaml:ro
      - ./secrets:/run/secrets:ro
      - ./oauth:/run/oauth:ro
      - ./audit:/var/lib/agent-credential-gateway/audit
    environment:
      CONFIG_PATH: /config/config.yaml
      SECRETLINT_CONFIG_PATH: /config/secretlint.yaml
      SENSITIVE_NAMES_CONFIG_PATH: /config/sensitive-names.yaml
      AGENT_GATEWAY_MCP_TOKEN: change-me-dev-token
      PORTAINER_API_KEY_FILE: /run/secrets/portainer_api_key
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
