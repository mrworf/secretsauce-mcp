global
  log stdout format raw local0
  maxconn 128

defaults
  log global
  mode http
  option httplog
  option http-buffer-request
  timeout connect 5s
  timeout client 65s
  timeout server 65s
  timeout http-request 10s
  timeout http-keep-alive 10s

frontend secretsauce_control
  bind :443 ssl crt /etc/haproxy/certs/control.example.org.pem alpn h2,http/1.1
  acl allowed_path path_beg -i /control /api/v2 /assets/brand/
  http-request deny deny_status 404 unless allowed_path
  http-request deny deny_status 413 if { req.body_size gt 2147483648 }
  http-request del-header Forwarded
  http-request del-header X-Forwarded-For
  http-request del-header X-Forwarded-Host
  http-request del-header X-Forwarded-Proto
  http-response set-header Strict-Transport-Security "max-age=31536000"
  http-response set-header Cache-Control "no-store" if { path_beg /api/v2 }
  default_backend secretsauce_control

backend secretsauce_control
  option httpchk GET /api/v2/health
  http-check expect rstatus (200|503)
  server control 127.0.0.1:8081 check maxconn 64
